name: Swift

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('VoiceInk.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Fetch whisper.cpp HEAD commit
        id: whisper_rev
        run: |
          REV=$(git ls-remote https://github.com/ggerganov/whisper.cpp.git HEAD | cut -f1)
          echo "rev=$REV" >> "$GITHUB_OUTPUT"

      - name: Cache whisper.xcframework
        id: whisper_cache
        uses: actions/cache@v4
        with:
          path: ~/VoiceInk-Dependencies/whisper.cpp/build-apple/whisper.xcframework
          key: whisper-xcframework-${{ runner.os }}-${{ steps.whisper_rev.outputs.rev }}
          restore-keys: whisper-xcframework-${{ runner.os }}-

      - name: Build whisper.xcframework
        if: steps.whisper_cache.outputs.cache-hit != 'true'
        run: |
          DEPS="$HOME/VoiceInk-Dependencies"
          WHISPER="$DEPS/whisper.cpp"
          mkdir -p "$DEPS"
          [ -d "$WHISPER" ] || git clone https://github.com/ggerganov/whisper.cpp.git "$WHISPER"
          (cd "$WHISPER" && git pull)
          cd "$WHISPER" && ./build-xcframework.sh

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk

      - name: Build
        run: |
          xcodebuild \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -configuration Debug \
            -xcconfig LocalBuild.xcconfig \
            -derivedDataPath .ci-build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            FRAMEWORK_SEARCH_PATHS="$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple" \
            build | xcpretty --color || true
          APP=$(find .ci-build -name 'VoiceInk.app' -type d | head -1)
          [ -n "$APP" ] || { echo "::error::VoiceInk.app not found"; exit 1; }
          echo "Build succeeded: $APP"

      - name: Test
        run: |
          xcodebuild \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -configuration Debug \
            -derivedDataPath .ci-build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            FRAMEWORK_SEARCH_PATHS="$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple" \
            test | xcpretty --color || true

      - name: Upload VoiceInk.app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-debug-${{ github.sha }}
          path: .ci-build/Build/Products/Debug/VoiceInk.app
          retention-days: 7

  lint:
    name: Swift Format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - name: Install swift-format
        run: brew install swift-format
      - name: Lint
        run: |
          swift-format lint --recursive VoiceInk/ \
            --ignore-unparsable-files 2>&1 | tee swift-format.log || true
          grep -q "error:" swift-format.log \
            && echo "::warning::Run: swift-format format --recursive VoiceInk/" || true
