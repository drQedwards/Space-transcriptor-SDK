name: Release

on:
  push:
    tags:
      - "v[0-9]*"
      - "Farcaster_*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / version to build (e.g. v1.80)"
        required: true
        default: "v1.80"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release DMG
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          BUILD=$(git tag --sort=creatordate | grep -cE '^(v[0-9]|Farcaster_)' || echo 1)
          IS_PRE="false"
          echo "$TAG" | grep -qE '(Farcaster_|beta|rc|alpha)' && IS_PRE="true"
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRE"        >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                  >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION | Build: $BUILD | Pre-release: $IS_PRE"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ClonedPackages
          key: spm-${{ runner.os }}-${{ hashFiles('VoiceInk.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Fetch whisper.cpp HEAD commit
        id: whisper_rev
        run: |
          REV=$(git ls-remote https://github.com/ggerganov/whisper.cpp.git HEAD | cut -f1)
          echo "rev=$REV" >> "$GITHUB_OUTPUT"

      - name: Cache whisper.xcframework
        uses: actions/cache@v4
        with:
          path: ~/VoiceInk-Dependencies/whisper.cpp/build-apple/whisper.xcframework
          key: whisper-xcframework-${{ runner.os }}-${{ steps.whisper_rev.outputs.rev }}
          restore-keys: whisper-xcframework-${{ runner.os }}-

      - name: Build whisper.xcframework
        if: steps.whisper_cache.outputs.cache-hit != 'true'
        run: |
          DEPS="$HOME/VoiceInk-Dependencies"
          WHISPER="$DEPS/whisper.cpp"
          mkdir -p "$DEPS"
          [ -d "$WHISPER" ] || git clone https://github.com/ggerganov/whisper.cpp.git "$WHISPER"
          (cd "$WHISPER" && git pull --ff-only)
          cd "$WHISPER" && ./build-xcframework.sh

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -clonedSourcePackagesDirPath "$HOME/Library/Developer/Xcode/DerivedData/ClonedPackages"

      # ── Signed build (P12 cert secrets available) ─────────────────────────
      - name: Import signing certificate
        id: import_cert
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        if: env.P12_BASE64 != '' && env.APPLE_TEAM_ID != ''
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p ci-pass ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci-pass ci.keychain
          security import /tmp/cert.p12 -k ci.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-pass ci.keychain
          echo "cert_imported=true" >> "$GITHUB_OUTPUT"

      - name: Build (signed)
        if: steps.import_cert.outputs.cert_imported == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -configuration Release \
            -derivedDataPath .release-build \
            -clonedSourcePackagesDirPath "$HOME/Library/Developer/Xcode/DerivedData/ClonedPackages" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            FRAMEWORK_SEARCH_PATHS="$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple" \
            archive -archivePath VoiceInk.xcarchive 2>&1 | xcpretty

      - name: Build (ad-hoc, no cert)
        if: steps.import_cert.outputs.cert_imported != 'true'
        run: |
          set -o pipefail
          xcodebuild \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -configuration Release \
            -xcconfig LocalBuild.xcconfig \
            -derivedDataPath .release-build \
            -clonedSourcePackagesDirPath "$HOME/Library/Developer/Xcode/DerivedData/ClonedPackages" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            FRAMEWORK_SEARCH_PATHS="$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple" \
            build 2>&1 | xcpretty

      # ── Notarize (only if APPLE_ID secret exists) ─────────────────────────
      - name: Notarize
        if: steps.import_cert.outputs.cert_imported == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit VoiceInk.xcarchive \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple VoiceInk.xcarchive

      # ── Package DMG ────────────────────────────────────────────────────────
      - name: Package DMG
        run: |
          if [ -d "VoiceInk.xcarchive" ]; then
            APP=$(find VoiceInk.xcarchive -name 'VoiceInk.app' -type d | head -1)
          else
            APP=$(find .release-build -name 'VoiceInk.app' -type d | head -1)
          fi
          [ -n "$APP" ] || { echo "::error::VoiceInk.app not found"; exit 1; }
          echo "Packaging: $APP"

          DMG_STAGING=$(mktemp -d)
          cp -R "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "VoiceInk ${{ steps.version.outputs.version }}" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            VoiceInk.dmg

          echo "DMG created: $(du -sh VoiceInk.dmg | cut -f1)"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-${{ steps.version.outputs.version }}.dmg
          path: VoiceInk.dmg
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: VoiceInk-${{ needs.build-release.outputs.version }}.dmg

      - name: Write release notes
        run: |
          TAG="${{ github.ref_name }}"
          cat > release_notes.md <<'NOTES'
          ## What's New

          - Closed Captioning overlay — real-time floating CC panel synced to your voice
          - Jumbotron hero component — animated feature announcements across the app
          - Full CI/CD workflow suite with build, test, security scanning, and automated releases

          ## Installation

          1. Download `VoiceInk.dmg` below
          2. Open the DMG and drag VoiceInk to Applications
          3. On first launch, right-click → Open if Gatekeeper prompts

          ## Requirements

          macOS 14.4 or later
          NOTES
          echo "" >> release_notes.md
          echo "_Tag: \`${TAG}\` · Build: ${{ needs.build-release.outputs.build_number }}_" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VoiceInk ${{ needs.build-release.outputs.version }}"
          body_path: release_notes.md
          files: VoiceInk.dmg
          draft: false
          prerelease: ${{ needs.build-release.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
